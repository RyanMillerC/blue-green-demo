apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: frontend-dev
spec:
  source:
    type: Binary
    binary: {}
    contextDir: frontend
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: frontend-dev:latest
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: backend-dev
spec:
  source:
    type: Binary
    binary: {}
    contextDir: backend
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: backend-dev:latest
