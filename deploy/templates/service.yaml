---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
  labels:
    app: {{ .Values.appName }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.appName }}
  ports:
    - name: "{{ .Values.containerPort }}-tcp"
      port: {{ .Values.containerPort }}
      targetPort: {{ .Values.containerPort }}
