<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        iframe {
            display: block;
            width: 100vw;
            height: 100vh;
            border: none;
        }
        #countdown {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            color: white;
            -webkit-font-smoothing: antialiased;
            font-family: Arial, sans-serif;
            font-size: 3rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.25);
            padding: 1rem 2rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <iframe id="frame" src="/frame"></iframe>
    <div id="countdown"></div>

    <script>
        const REFRESH_SECONDS = 5;
        let secondsLeft = REFRESH_SECONDS;

        function tick() {
            document.getElementById('countdown').textContent = `Refreshing in ${secondsLeft}s...`;
            secondsLeft--;
            if (secondsLeft === 0) {
                document.getElementById('frame').src = '/frame';
                secondsLeft = REFRESH_SECONDS;
            }
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
