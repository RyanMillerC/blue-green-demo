<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }

        iframe {
            display: block;
            width: 100vw;
            height: 100vh;
            border: none;
            transition: width 0.25s ease;
        }

        iframe.pane-open { width: 67vw; }

        #controls {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: right 0.25s ease;
        }

        #controls.pane-open { right: calc(33vw + 1.5rem); }

        #countdown, #menu-btn {
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-family: Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            line-height: 1;
        }

        #menu-btn {
            border: none;
            cursor: pointer;
        }

        #log-pane {
            position: fixed;
            top: 0;
            right: -33vw;
            width: 33vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.88);
            color: white;
            font-family: Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            z-index: 199;
            transition: right 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        #log-pane.open { right: 0; }

        #log-pane h2 {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            letter-spacing: 0.05em;
        }

        #log-entries {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 1.5rem;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            font-size: 0.95rem;
        }

        .log-entry .time { color: rgba(255, 255, 255, 0.5); }
        .log-entry .status-ok { color: #44dd88; }
        .log-entry .status-err { color: #ff5555; }
    </style>
</head>
<body>
    <iframe id="frame" src="/frame"></iframe>
    <div id="controls">
        <div id="countdown"></div>
        <button id="menu-btn" onclick="togglePane()">&#9776;</button>
    </div>
    <div id="log-pane">
        <h2>CONNECTION LOG</h2>
        <div id="log-entries"></div>
    </div>

    <script>
        const ERROR_SRCDOC = `<!DOCTYPE html><html><head><style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background-color: #cc0000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial, sans-serif; -webkit-font-smoothing: antialiased; }
            h1 { color: white; font-size: 5rem; font-weight: bold; letter-spacing: 0.4em; margin: 2rem 0; }
            .spacer { width: 340px; height: 340px; }
        </style></head><body><h1>SERVER</h1><div class="spacer"></div><h1>ERROR</h1></body></html>`;

        const REFRESH_SECONDS = 5;
        let secondsLeft = REFRESH_SECONDS;
        const logs = [];
        const frame = document.getElementById('frame');

        function togglePane() {
            const pane = document.getElementById('log-pane');
            const controls = document.getElementById('controls');
            const btn = document.getElementById('menu-btn');
            pane.classList.toggle('open');
            const isOpen = pane.classList.contains('open');
            controls.classList.toggle('pane-open', isOpen);
            frame.classList.toggle('pane-open', isOpen);
            btn.innerHTML = isOpen ? '&times;' : '&#9776;';
        }

        function addLog(ok) {
            const now = new Date();
            const time = now.toLocaleTimeString();
            logs.unshift({ time, ok });
            renderLogs();
        }

        function renderLogs() {
            const el = document.getElementById('log-entries');
            el.innerHTML = logs.map(e => `
                <div class="log-entry">
                    <span class="time">${e.time}</span>
                    <span class="${e.ok ? 'status-ok' : 'status-err'}">${e.ok ? 'Connected' : 'Server Error'}</span>
                </div>
            `).join('');
        }

        async function refresh() {
            let ok = false;
            try {
                const res = await fetch('/frame');
                ok = res.ok;
            } catch {}
            addLog(ok);
            if (ok) {
                frame.removeAttribute('srcdoc');
                frame.src = '/frame';
            } else {
                frame.srcdoc = ERROR_SRCDOC;
            }
            secondsLeft = REFRESH_SECONDS;
        }

        function tick() {
            document.getElementById('countdown').textContent = `Refreshing in ${secondsLeft}s...`;
            secondsLeft--;
            if (secondsLeft === 0) {
                refresh();
            }
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
