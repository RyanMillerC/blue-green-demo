<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0033cc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 0.4em;
            margin: 2rem 0;
        }

        iframe {
            width: 340px;
            height: 340px;
            border: none;
            background: transparent;
        }

        #countdown {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            color: white;
            -webkit-font-smoothing: antialiased;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            background: rgba(0, 0, 0, 0.25);
            padding: 1rem 2rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>DEMO</h1>
    <iframe id="frame" src="/frame"></iframe>
    <h1>DEMO</h1>
    <div id="countdown">5s</div>

    <script>
        const REFRESH_SECONDS = 5;
        let secondsLeft = REFRESH_SECONDS;

        function tick() {
            document.getElementById('countdown').textContent = `${secondsLeft}s`;
            if (secondsLeft <= 0) {
                document.getElementById('frame').src = '/frame';
                secondsLeft = REFRESH_SECONDS;
            }
            secondsLeft--;
        }

        setInterval(tick, 1000);
    </script>
</body>
</html>
